name: Bug report
description: Report a reproducible problem.
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      placeholder: Describe the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: 1. Go to ... 2. Click ... 3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit / Branch
      placeholder: feat/example or commit hash
